<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/pico.cyan.min.css" />
    <link rel="stylesheet" href="/common.css" />
    <link rel="stylesheet" href="/index.css" />
    <title>Ophir 2D</title>
</head>

<body>
    <div class="navbar">
        <a href="/about">About</a>&nbsp|&nbsp;
        <a href="/how-to-play">Game Rules</a>
    </div>
    <div class="content">
        <h2>
            Ophir 2D
        </h2>
        <div class="button-row">
            <button id="tour">Play Tutorial</button>
            <button id="auth">Log In</button>
        </div>
    </div>
    <script>
        window.addEventListener('pageshow', (event) => {
            if (event.persisted)
                window.location.reload();
        });
        document.querySelector('#tour').addEventListener('click', (event) => {
            window.location.href = '/tour-game'
        });
        document.querySelector('#auth').addEventListener('click', (event) => {
            window.location.href = '/authentication'
        });
    </script>
</body>

</html>
